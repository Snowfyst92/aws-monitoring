# prometheus.yml
global:
  scrape_interval: 15s  # fréquence de récupération des métriques

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node_exporter:9100']   # remplacer localhost par l'IP publique ou privée de la VM si besoin
